<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.15" intercept="0.08"/>
        <feFuncG type="linear" slope="0.15" intercept="0.08"/>
        <feFuncB type="linear" slope="0.15" intercept="0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="256" height="256" fill="#1a1a1a"/>
  <rect width="256" height="256" filter="url(#noise)" opacity="1"/>
</svg>
